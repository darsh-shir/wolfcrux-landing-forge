    <script>
      // Apply saved theme before React mounts to prevent flash
      (function () {
        try {
          var t = localStorage.getItem("wolfcrux-theme");
          if (t === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) {}
      })();
